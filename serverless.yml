service: mobitrak-backend
# Deployment trigger: 2026-02-21

frameworkVersion: '3'

# Automatically load .env file for local development (serverless offline).
# In CI/CD, env vars come from GitHub Actions secrets injected via the env: block.
useDotenv: true

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 10
  # HTTP API (API Gateway v2)
  # CORS must be configured at the API Gateway level for HTTP API (v2).
  # API Gateway intercepts preflight OPTIONS requests BEFORE they reach Lambda,
  # so Express cors() middleware alone is insufficient. Both layers are needed:
  #   - API Gateway handles the OPTIONS preflight (configured here)
  #   - Express cors() sets headers on actual POST/GET/etc responses
  #
  # IMPORTANT: allowedOrigins below are YAML literals read at deploy time by
  # CloudFormation — they are NOT resolved from environment variables at runtime.
  # To change allowed origins, edit this list and redeploy.
  # The ALLOWED_ORIGINS env var below only affects the Express cors() middleware.
  httpApi:
    payload: '2.0'
    cors:
      allowedOrigins:
        - 'http://localhost:5173'
        - 'https://mobitrakapp.vercel.app'
      allowedHeaders:
        - Content-Type
        - Authorization
        - x-auth-token
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true
      maxAge: 600

  # Environment variables — loaded from process.env / GitHub Secrets / Lambda env
  # DO NOT hardcode values here. Use ${env:VAR_NAME} to read from environment.
  environment:
    NODE_ENV: ${env:NODE_ENV, 'production'}
    MONGO_URI: ${env:MONGO_URI}
    JWT_SECRET: ${env:JWT_SECRET}
    FRONTEND_URL: ${env:FRONTEND_URL, 'http://localhost:5173'}
    ALLOWED_ORIGINS: ${env:ALLOWED_ORIGINS, 'http://localhost:5173,https://mobitrakapp.vercel.app'}
    SMTP_HOST: ${env:SMTP_HOST}
    SMTP_PORT: ${env:SMTP_PORT}
    SMTP_USER: ${env:SMTP_USER}
    SMTP_PASS: ${env:SMTP_PASS}
    EMAIL_FROM: ${env:EMAIL_FROM}
    CLOUDINARY_CLOUD_NAME: ${env:CLOUDINARY_CLOUD_NAME}
    CLOUDINARY_API_KEY: ${env:CLOUDINARY_API_KEY}
    CLOUDINARY_API_SECRET: ${env:CLOUDINARY_API_SECRET}
    OCR_SPACE_API_KEY_USER: ${env:OCR_SPACE_API_KEY_USER}
    OCR_SPACE_API_KEY_VEHICLE: ${env:OCR_SPACE_API_KEY_VEHICLE}
    OPENROUTER_API_KEY_USER: ${env:OPENROUTER_API_KEY_USER}
    OPENROUTER_API_KEY_VEHICLE: ${env:OPENROUTER_API_KEY_VEHICLE}
    AI_API_URL: ${env:AI_API_URL}
    AI_MODEL: ${env:AI_MODEL}
    MAPBOX_ACCESS_TOKEN: ${env:MAPBOX_ACCESS_TOKEN}
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID}
    RAZORPAY_KEY_ID: ${env:RAZORPAY_KEY_ID, ''}
    RAZORPAY_KEY_SECRET: ${env:RAZORPAY_KEY_SECRET, ''}
    # Inter-service URLs — all services are behind the same API Gateway
    USER_SERVICE_URL: ${env:USER_SERVICE_URL, 'https://g5ly7nfs0m.execute-api.ap-south-1.amazonaws.com'}
    TRIP_SERVICE_URL: ${env:TRIP_SERVICE_URL, 'https://g5ly7nfs0m.execute-api.ap-south-1.amazonaws.com'}
    VEHICLE_SERVICE_URL: ${env:VEHICLE_SERVICE_URL, 'https://g5ly7nfs0m.execute-api.ap-south-1.amazonaws.com'}
    # Pusher real-time credentials
    PUSHER_APP_ID: ${env:PUSHER_APP_ID, '2132002'}
    PUSHER_KEY: ${env:PUSHER_KEY, '3c443eb0dc81a17f2142'}
    PUSHER_SECRET: ${env:PUSHER_SECRET, 'ba6bbe7e72755386b914'}
    PUSHER_CLUSTER: ${env:PUSHER_CLUSTER, 'ap2'}

functions:
  # ===== User Service =====
  userService:
    handler: user-service/handler.handler
    description: User auth, admin, and notification management
    events:
      # Explicit routes for commonly-called endpoints (avoids {proxy+} ambiguity)
      - httpApi:
          path: /api/users/login
          method: any
      - httpApi:
          path: /api/users/register/fleetmanager
          method: any
      - httpApi:
          path: /api/users/register/driver
          method: any
      # Catch-all for all other /api/users/* paths
      - httpApi:
          path: /api/users/{proxy+}
          method: any
      - httpApi:
          path: /api/admin
          method: any
      - httpApi:
          path: /api/admin/{proxy+}
          method: any
      - httpApi:
          path: /api/notifications
          method: any
      - httpApi:
          path: /api/notifications/{proxy+}
          method: any
      - httpApi:
          path: /health
          method: any

  # ===== Vehicle Service =====
  vehicleService:
    handler: vehicle-service/handler.handler
    description: Vehicle and tracking device management
    events:
      - httpApi:
          path: /api/vehicles/{proxy+}
          method: any
      - httpApi:
          path: /api/vehicles
          method: any
      - httpApi:
          path: /api/tracking-device/{proxy+}
          method: any
      - httpApi:
          path: /api/tracking-device
          method: any
      - httpApi:
          path: /api/maintenance/{proxy+}
          method: any
      - httpApi:
          path: /api/maintenance
          method: any

  # ===== Driver Management Service =====
  driverService:
    handler: driver-management-service/handler.handler
    description: Driver profiles, job requests, employments, and ratings
    events:
      - httpApi:
          path: /api/drivers/{proxy+}
          method: any
      - httpApi:
          path: /api/drivers
          method: any

  # ===== Trip Service =====
  tripService:
    handler: trip-service/handler.handler
    description: Trip management and real-time fleet tracking
    events:
      - httpApi:
          path: /api/trips/{proxy+}
          method: any
      - httpApi:
          path: /api/trips
          method: any
      # Pusher-based real-time relay endpoints (replaces socket.io)
      - httpApi:
          path: /api/realtime/{proxy+}
          method: any
      - httpApi:
          path: /api/realtime
          method: any

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    host: 0.0.0.0
    noPrependStageInUrl: true

package:
  individually: false
  exclude:
    # Dev / repo artifacts
    - .git/**
    - .env
    - logs.txt
    - cors-test.sh
    - '**/*.md'
    - '**/.DS_Store'
    # Test files (all levels)
    - '**/*.test.js'
    - '**/*.spec.js'
    - '**/test/**'
    - '**/tests/**'
    - '**/__tests__/**'
    - '**/jest.config.*'
    # TypeScript / source-map files (not needed at runtime)
    - '**/*.ts'
    - '**/*.d.ts'
    - '**/*.map'
    # Docs / examples inside node_modules
    - '**/node_modules/**/docs/**'
    - '**/node_modules/**/doc/**'
    - '**/node_modules/**/example/**'
    - '**/node_modules/**/examples/**'
    - '**/node_modules/**/demo/**'
    - '**/node_modules/**/CHANGELOG*'
    - '**/node_modules/**/HISTORY*'
    - '**/node_modules/**/LICENSE*'
    - '**/node_modules/**/README*'
    # Dev-only packages
    - '**/node_modules/.cache/**'
    - '**/node_modules/nodemon/**'
    - '**/node_modules/jest/**'
    - '**/node_modules/mocha/**'
    - '**/node_modules/chai/**'
    - '**/node_modules/eslint/**'
    - '**/node_modules/prettier/**'
    - '**/node_modules/typescript/**'
    # Large transitive packages not needed in Lambda
    - '**/node_modules/serverless/**'
    - '**/node_modules/serverless-offline/**'
    # Service-level node_modules — excluded because all deps are now
    # consolidated in the root node_modules (see root package.json).
    # The root node_modules is the single source of truth for Lambda.
    - 'user-service/node_modules/**'
    - 'vehicle-service/node_modules/**'
    - 'driver-management-service/node_modules/**'
    - 'trip-service/node_modules/**'


